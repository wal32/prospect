<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProspectFlow AI</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
.sidebar{width:220px;height:100vh;background:#020617;position:fixed;padding:20px}
.sidebar h2{color:#38bdf8}
.sidebar a{display:block;color:#94a3b8;text-decoration:none;margin:15px 0}
.main{margin-left:240px;padding:20px}
.card{background:#020617;padding:20px;border-radius:10px;margin-bottom:20px}
button{background:#38bdf8;border:none;padding:10px;border-radius:5px;color:#000;cursor:pointer}
.kanban{display:flex;gap:20px}
.column{flex:1;background:#020617;padding:10px;border-radius:10px}
.lead{background:#0f172a;margin:10px 0;padding:10px;border-radius:5px}
input,textarea{width:100%;padding:10px;margin:5px 0;border:none;border-radius:5px}
</style>
</head>
<body>

<div class="sidebar">
<h2>ProspectFlow</h2>
<a href="#">Dashboard</a>
<a href="#crm">CRM</a>
<a href="#automacao">Automação</a>
<a href="#leads">Leads</a>
<a href="#config">Config</a>
</div>

<div class="main">

<div class="card">
<h1>Dashboard</h1>
<p>Leads hoje: 12</p>
<p>Conversões: 3</p>
</div>

<div class="card" id="crm">
<h2>CRM Kanban</h2>
<div class="kanban">
<div class="column">
<h3>Novos</h3>
<div class="lead">João - Interesse</div>
</div>
<div class="column">
<h3>Contato</h3>
<div class="lead">Maria - Respondeu</div>
</div>
<div class="column">
<h3>Fechado</h3>
<div class="lead">Carlos - Cliente</div>
</div>
</div>
</div>

<div class="card" id="leads">
<h2>Adicionar Lead</h2>
<input placeholder="Nome">
<input placeholder="WhatsApp">
<textarea placeholder="Observação"></textarea>
<button>Salvar</button>
</div>

<div class="card" id="automacao">
<h2>Automação IA</h2>
<textarea placeholder="Mensagem automática"></textarea>
<button>Ativar Automação</button>
</div>

<div class="card" id="config">
<h2>Integração</h2>
<p>Conectar WhatsApp (QR Code)</p>
<button>Conectar</button>
</div>

</div>

</body>
</html>
